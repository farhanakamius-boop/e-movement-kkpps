<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Live Status Pensyarah Kolej Komuniti Papar (KKPPS). Lihat status terkini pensyarah sama ada di dalam kampus atau keluar dengan destinasi dan masa jangka kembali.">
    <title>e-Hadir KKPPS | Live Status Pensyarah</title>
    <!-- CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">KP</div>
                <div class="logo-text">
                    <h1>e-Hadir KKPPS</h1>
                    <p>Kolej Komuniti Papar, Sabah</p>
                </div>
            </div>
            
            <!-- Paparan Masa & Tarikh Live -->
            <div class="datetime-container">
                <span class="datetime-date" id="liveDate">-</span>
                <span class="datetime-time" id="liveTime">-</span>
            </div>

            <div class="header-controls">
                <button class="btn-theme" id="themeToggle" title="Tukar Tema (Gelap/Cerah)">
                    <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
                </button>
                <a href="login.html" class="btn-login">
                    <span class="material-symbols-outlined">login</span>
                    <span>Portal Pensyarah</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-container">
        
        <!-- Stats Row -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon all">
                    <span class="material-symbols-outlined">groups</span>
                </div>
                <div class="stat-info">
                    <h3 id="statTotal">-</h3>
                    <p>Jumlah Pensyarah</p>
                </div>
            </div>
            <div class="stat-card in-campus">
                <div class="stat-icon in">
                    <span class="material-symbols-outlined">domain</span>
                </div>
                <div class="stat-info">
                    <h3 id="statIn">-</h3>
                    <p>Dalam Kampus</p>
                </div>
            </div>
            <div class="stat-card out-campus">
                <div class="stat-icon out">
                    <span class="material-symbols-outlined">logout</span>
                </div>
                <div class="stat-info">
                    <h3 id="statOut">-</h3>
                    <p>Keluar Kampus</p>
                </div>
            </div>
        </section>

        <!-- Search and Filter Bar -->
        <section class="control-bar">
            <div class="search-box">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari nama pensyarah atau unit/jawatan...">
            </div>
            
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="in">Dalam Kampus</button>
                <button class="filter-btn" data-filter="out">Keluar</button>
            </div>

            <div class="live-indicator">
                <div class="pulse-dot"></div>
                <span id="liveText">LIVE</span>
            </div>
        </section>

        <!-- Lecturers Card Grid -->
        <section class="cards-grid" id="lecturersGrid">
            <!-- Skeleton items or JS inject will appear here -->
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                <div class="spinner" style="margin: 0 auto 1rem auto; width: 40px; height: 40px; border-color: rgba(79,70,229,0.2); border-top-color: var(--primary);"></div>
                <p style="color: var(--text-muted); font-weight: 500;">Memuatkan data pensyarah...</p>
            </div>
        </section>
        
    </main>

    <!-- JS scripts -->
    <script src="js/app.js"></script>
</body>
</html>
